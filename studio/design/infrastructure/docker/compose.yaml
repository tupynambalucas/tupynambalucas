name: tupynambalucas-penpot

networks:
  penpot-net:
    name: tupynambalucas-penpot-net
    driver: bridge
  memos-net:
    name: tupynambalucas-memos-net
    driver: bridge

services:
  frontend:
    profiles:
      - penpot
    container_name: tupynambalucas-penpot-frontend
    image: tupynambalucas-penpot-frontend:${TAG:-latest}
    build:
      context: ../../penpot/frontend
      dockerfile: Dockerfile
      args:
        - PENPOT_VERSION=${PENPOT_VERSION:-latest}
    ports:
      - '${PENPOT_FRONTEND_PORT:-9005}:8080'
    environment:
      - PENPOT_FLAGS=${PENPOT_FLAGS}
      - PENPOT_REDIS_URI=${PENPOT_REDIS_URI}
      - PENPOT_SECRET_KEY=${PENPOT_SECRET_KEY}
      - PENPOT_BACKEND_URI=${PENPOT_BACKEND_URI}
      - PENPOT_EXPORTER_URI=${PENPOT_EXPORTER_URI}
    depends_on:
      - backend
      - exporter
    networks:
      - penpot-net
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'tupynambalucas.internal:host-gateway'

  backend:
    profiles:
      - penpot
    container_name: tupynambalucas-penpot-backend
    image: tupynambalucas-penpot-backend:${TAG:-latest}
    build:
      context: ../../penpot/backend
      dockerfile: Dockerfile
      args:
        - PENPOT_VERSION=${PENPOT_VERSION:-latest}
    environment:
      - PENPOT_FLAGS=${PENPOT_FLAGS}
      - PENPOT_REDIS_URI=${PENPOT_REDIS_URI}
      - PENPOT_SECRET_KEY=${PENPOT_SECRET_KEY}
      - PENPOT_PUBLIC_URI=${PENPOT_PUBLIC_URI}
      - PENPOT_DATABASE_URI=${PENPOT_DATABASE_URI}
      - PENPOT_DATABASE_USERNAME=${PENPOT_DATABASE_USERNAME}
      - PENPOT_DATABASE_PASSWORD=${PENPOT_DATABASE_PASSWORD}
      - PENPOT_OBJECTS_STORAGE_BACKEND=${PENPOT_OBJECTS_STORAGE_BACKEND}
      - PENPOT_OBJECTS_STORAGE_S3_ENDPOINT=${PENPOT_OBJECTS_STORAGE_S3_ENDPOINT}
      - PENPOT_OBJECTS_STORAGE_S3_BUCKET=${PENPOT_OBJECTS_STORAGE_S3_BUCKET}
      - PENPOT_OBJECTS_STORAGE_S3_REGION=${PENPOT_OBJECTS_STORAGE_S3_REGION}
      - PENPOT_OBJECTS_STORAGE_S3_FORCE_PATH_STYLE=${PENPOT_OBJECTS_STORAGE_S3_FORCE_PATH_STYLE}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - penpot-net
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'tupynambalucas.internal:host-gateway'

  exporter:
    profiles:
      - penpot
    container_name: tupynambalucas-penpot-exporter
    image: tupynambalucas-penpot-exporter:${TAG:-latest}
    build:
      context: ../../penpot/exporter
      dockerfile: Dockerfile
      args:
        - PENPOT_VERSION=${PENPOT_VERSION:-latest}
    environment:
      - PENPOT_FLAGS=${PENPOT_FLAGS}
      - PENPOT_REDIS_URI=${PENPOT_REDIS_URI}
      - PENPOT_SECRET_KEY=${PENPOT_SECRET_KEY}
      - PENPOT_PUBLIC_URI=${PENPOT_EXPORTER_PUBLIC_URI}
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - penpot-net
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'tupynambalucas.internal:host-gateway'

  valkey:
    profiles:
      - penpot
    container_name: tupynambalucas-penpot-valkey
    image: tupynambalucas-penpot-valkey:${TAG:-latest}
    build:
      context: ../../penpot/valkey
      dockerfile: Dockerfile
    volumes:
      - penpot_valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - penpot-net

  aide:
    profiles:
      - penpot
    container_name: tupynambalucas-penpot-aide
    image: tupynambalucas-penpot-aide:${TAG:-latest}
    build:
      context: ../../penpot/aide
      dockerfile: Dockerfile
      args:
        - PENPOT_VERSION=${PENPOT_VERSION:-latest}
    ports:
      - '${PENPOT_AIDE_PORT_4400:-4400}:4400'
      - '${PENPOT_AIDE_PORT_4401:-4401}:4401'
      - '${PENPOT_AIDE_PORT_4402:-4402}:4402'
      - '${PENPOT_AIDE_PORT_4403:-4403}:4403'
    environment:
      - PENPOT_SECRET_KEY=${PENPOT_SECRET_KEY}
      - PENPOT_MCP_SERVER_HOST=${PENPOT_MCP_SERVER_HOST}
      - PENPOT_MCP_SERVER_LISTEN_ADDRESS=${PENPOT_MCP_SERVER_LISTEN_ADDRESS}
      - PENPOT_MCP_PLUGIN_SERVER_HOST=${PENPOT_MCP_PLUGIN_SERVER_HOST}
      - PENPOT_MCP_REMOTE_MODE=${PENPOT_MCP_REMOTE_MODE}
      - PENPOT_MCP_SERVER_ADDRESS=${PENPOT_MCP_SERVER_ADDRESS}
    networks:
      - penpot-net

  memos:
    profiles:
      - memos
    container_name: tupynambalucas-memos
    image: tupynambalucas-memos:stable
    build:
      context: ../../memos
      dockerfile: Dockerfile
    ports:
      - '${MEMOS_PORT:-5230}:5230'
    volumes:
      - ../../memos/data:/var/opt/memos
    environment:
      - MEMOS_PORT=5230
      - MEMOS_DRIVER=${MEMOS_DRIVER}
      - MEMOS_DSN=${MEMOS_DSN}
    networks:
      - memos-net
    restart: unless-stopped

volumes:
  penpot_valkey_data:
    name: tupynambalucas-penpot-valkey-data
