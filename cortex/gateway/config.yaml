# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config:
  adminAddr: '[::]:15000'
  statsAddr: '[::]:15001'
  logging:
    format: json
  tracing:
    otlpEndpoint: http://otel-collector:4317
    randomSampling: true
mcp:
  port: 8080
  policies:
    cors:
      allowOrigins:
        - http://localhost:15000
        - http://127.0.0.1:15000
        - http://localhost:19000
      allowMethods:
        - '*'
        - GET
        - POST
      allowHeaders:
        - '*'
      exposeHeaders:
        - Mcp-Session-Id
      allowCredentials: true
    mcpGuardrails:
      processors:
        - kind: remote
          host: mcp-guardrails:9001
          failureMode: failOpen
          methods:
            tools/call: request
            tools/list: response
  targets:
    - name: github
      mcp:
        host: http://mcp-github:8080/mcp
      policies:
        backendAuth:
          key: '$GITHUB_PERSONAL_ACCESS_TOKEN'
    - name: context7
      mcp:
        host: https://mcp.context7.com/mcp
      policies:
        backendAuth:
          key: '$CONTEXT7_API_KEY'
    - name: firecrawl
      mcp:
        host: http://mcp-firecrawl:8080/mcp
    - name: grafana
      mcp:
        host: http://mcp-grafana:8080/mcp
    - name: playwright
      mcp:
        host: http://mcp-playwright:8080/mcp
  statefulMode: stateless
  prefixMode: null
  failureMode: failOpen
binds: []
llm:
  port: 4000
  models: []
  providers: []
  virtualModels: []
frontendPolicies:
  http:
    maxBufferSize: 33554432
