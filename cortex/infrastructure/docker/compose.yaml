name: tupynambalucas-cortex

networks:
  cortex-net:
    name: tupynambalucas-cortex-net
    driver: bridge
  platform-net:
    name: tupynambalucas-platform-net
    external: true

services:
  # ==========================================
  # CORE INGRESS GATEWAY (agentgateway)
  # ==========================================
  agentgateway:
    profiles: ['core', 'mcp', 'agents']
    image: cr.agentgateway.dev/agentgateway:v1.3.1
    container_name: tupynambalucas-cortex-gateway
    ports:
      - '${GATEWAY_PORT:-8080}:8080' # Main traffic
      - '15000:15000' # Web UI
    volumes:
      - ../../gateway/config.yaml:/config.yaml
    command: ['-f', '/config.yaml']
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      cortex-net:
      platform-net:
        aliases:
          - agentgateway-metrics

  # ==========================================
  # MCP DATA PLANE SERVICES
  # ==========================================
  mcp-github:
    profiles: ['mcp', 'agents']
    container_name: tupynambalucas-cortex-mcp-github
    build:
      context: ../../mcp/github
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      - cortex-net

  mcp-firecrawl:
    profiles: ['mcp', 'agents']
    container_name: tupynambalucas-cortex-mcp-firecrawl
    build:
      context: ../../mcp/firecrawl
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    networks:
      - cortex-net

  mcp-grafana:
    profiles: ['mcp', 'agents']
    container_name: tupynambalucas-cortex-mcp-grafana
    build:
      context: ../../mcp/grafana
    environment:
      - GRAFANA_URL=${GRAFANA_CLOUD_URL}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    networks:
      - cortex-net

  mcp-playwright:
    profiles: ['mcp', 'agents']
    container_name: tupynambalucas-cortex-mcp-playwright
    build:
      context: ../../mcp/playwright
    environment:
      - PLAYWRIGHT_MCP_PORT=${PLAYWRIGHT_MCP_PORT:-8080}
      - PLAYWRIGHT_MCP_HOST=${PLAYWRIGHT_MCP_HOST:-0.0.0.0}
      - PLAYWRIGHT_MCP_BROWSER=${PLAYWRIGHT_MCP_BROWSER:-chromium}
      - PLAYWRIGHT_MCP_HEADLESS=${PLAYWRIGHT_MCP_HEADLESS:-true}
      - PLAYWRIGHT_MCP_NO_SANDBOX=${PLAYWRIGHT_MCP_NO_SANDBOX:-true}
      - PLAYWRIGHT_MCP_ALLOWED_HOSTS=${PLAYWRIGHT_MCP_ALLOWED_HOSTS:-*}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - cortex-net

  # ==========================================
  # AI AGENT RUNTIMES (Control Plane)
  # ==========================================
  agent-copilot:
    profiles: ['agents']
    container_name: agent-copilot
    build:
      context: ../../agents/copilot
    restart: always
    environment:
      - COPILOT_HOME=/root/.copilot
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ../../../:/workspace
      - /workspace/.agents
      - ../../agents/skills:/workspace/.agents/skills
      - ../../data/copilot:/root/.copilot
      - ../../data/copilot/gh-config:/root/.config/gh
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    networks:
      - cortex-net
    extra_hosts:
      - 'tupynambalucas.internal.tools.mcp:host-gateway'
    command: >
      bash -c "
      mkdir -p /root/.copilot &&
      cp /workspace/cortex/agents/shared/mcp.config.json /root/.copilot/mcp-config.json || true &&
      exec tail -f /dev/null
      "

  agent-antigravity:
    profiles: ['agents']
    container_name: agent-antigravity
    build:
      context: ../../agents/antigravity
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ../../../:/workspace
      - /workspace/.agents
      - ../../agents/skills:/workspace/.agents/skills
      - ../../data/antigravity:/root/.gemini
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    networks:
      - cortex-net
    extra_hosts:
      - 'tupynambalucas.internal.tools.mcp:host-gateway'
    command: >
      bash -c "
      mkdir -p /root/.gemini/config &&
      cp /workspace/cortex/agents/shared/mcp.config.json /root/.gemini/config/mcp_config.json || true &&
      exec tail -f /dev/null
      "
