name: tupynambalucas-cortex

networks:
  cortex-net:
    name: tupynambalucas-cortex-net
    driver: bridge
  platform-net:
    name: tupynambalucas-platform-net
    external: true

volumes:
  mongodb_memory_data:
    name: tupynambalucas-cortex-mongodb-data

services:
  # ==========================================
  # CORE INGRESS GATEWAY (agentgateway)
  # ==========================================
  agentgateway:
    profiles: ['core']
    image: cr.agentgateway.dev/agentgateway:v1.3.1
    container_name: tupynambalucas-cortex-gateway
    ports:
      - '${GATEWAY_PORT:-8080}:8080' # Main traffic
      - '15000:15000' # Web UI
    volumes:
      - ../../gateway/config.yaml:/config.yaml
    command: ['-f', '/config.yaml']
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      cortex-net:
      platform-net:
        aliases:
          - agentgateway-metrics

  mcp-guardrails:
    profiles: ['core']
    container_name: tupynambalucas-cortex-mcp-guardrails
    build:
      context: ../../../
      dockerfile: cortex/gateway/guardrails/Dockerfile
    volumes:
      - ../../mcp:/mcp:ro
    environment:
      - GUARDRAILS_PORT=9001
      - GUARDRAILS_HOST=0.0.0.0
      - MCP_DIR=/mcp
    networks:
      - cortex-net

  # ==========================================
  # CORE MEMORY SUBSYSTEM
  # ==========================================
  mongodb-db:
    profiles: ['core', 'memory']
    build:
      context: ../../memory/services/mongodb
      dockerfile: Dockerfile
    container_name: tupynambalucas-cortex-mongodb-db
    restart: unless-stopped
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/data/mongo-keyfile']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MEMORY_MONGO_INITDB_ROOT_USERNAME:-cortex_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MEMORY_MONGO_INITDB_ROOT_PASSWORD:-cortex_password_dev}
      MONGO_INITDB_DATABASE: ${MEMORY_MONGO_INITDB_DATABASE:-cortex_memory}
    volumes:
      - mongodb_memory_data:/data/db
    ports:
      - '${MEMORY_MONGO_PORT:-27018}:27017'
    networks:
      - cortex-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb-init:
    profiles: ['core', 'memory']
    build:
      context: ../../memory/services/mongodb
      dockerfile: Dockerfile
    container_name: tupynambalucas-cortex-mongodb-init
    entrypoint: ['./init-db.sh']
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MEMORY_MONGO_INITDB_ROOT_USERNAME:-cortex_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MEMORY_MONGO_INITDB_ROOT_PASSWORD:-cortex_password_dev}
    depends_on:
      mongodb-db:
        condition: service_healthy
    networks:
      - cortex-net

  memory-api:
    profiles: ['memory']
    container_name: tupynambalucas-cortex-memory-api
    build:
      context: ../../../
      dockerfile: cortex/memory/services/api/Dockerfile
    environment:
      - PORT=${PORT:-3006}
      - HOST=${HOST:-0.0.0.0}
      - NODE_ENV=${NODE_ENV:-development}
      - MONGODB_URI=mongodb://${MEMORY_MONGO_INITDB_ROOT_USERNAME:-cortex_admin}:${MEMORY_MONGO_INITDB_ROOT_PASSWORD:-cortex_password_dev}@mongodb-db:27017/cortex_memory?authSource=admin&replicaSet=rs0
      - DOCS_DIR=/app/docs
    ports:
      - '3006:3006'
    volumes:
      - ../../../docs:/app/docs:ro
    depends_on:
      mongodb-db:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - cortex-net

  memory-web:
    profiles: ['memory']
    container_name: tupynambalucas-cortex-memory-web
    build:
      context: ../../../
      dockerfile: cortex/memory/services/web/Dockerfile
      args:
        - VITE_API_URL=http://localhost:3006/api/memory
    ports:
      - '9006:9006'
    depends_on:
      - memory-api
    networks:
      - cortex-net

  # ==========================================
  # MCP DATA PLANE SERVICES
  # ==========================================
  mcp-github:
    profiles: ['core']
    container_name: tupynambalucas-cortex-mcp-github
    build:
      context: ../../mcp/github
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      - cortex-net

  mcp-firecrawl:
    profiles: ['core']
    container_name: tupynambalucas-cortex-mcp-firecrawl
    build:
      context: ../../mcp/firecrawl
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    networks:
      - cortex-net

  mcp-grafana:
    profiles: ['core']
    container_name: tupynambalucas-cortex-mcp-grafana
    build:
      context: ../../mcp/grafana
    environment:
      - GRAFANA_URL=${GRAFANA_CLOUD_URL}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    networks:
      - cortex-net

  mcp-playwright:
    profiles: ['core']
    container_name: tupynambalucas-cortex-mcp-playwright
    build:
      context: ../../mcp/playwright
    environment:
      - PLAYWRIGHT_MCP_PORT=${PLAYWRIGHT_MCP_PORT:-8080}
      - PLAYWRIGHT_MCP_HOST=${PLAYWRIGHT_MCP_HOST:-0.0.0.0}
      - PLAYWRIGHT_MCP_BROWSER=${PLAYWRIGHT_MCP_BROWSER:-chromium}
      - PLAYWRIGHT_MCP_HEADLESS=${PLAYWRIGHT_MCP_HEADLESS:-true}
      - PLAYWRIGHT_MCP_NO_SANDBOX=${PLAYWRIGHT_MCP_NO_SANDBOX:-true}
      - PLAYWRIGHT_MCP_ALLOWED_HOSTS=${PLAYWRIGHT_MCP_ALLOWED_HOSTS:-*}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - cortex-net

  # ==========================================
  # AI AGENT RUNTIMES (Control Plane)
  # ==========================================
  agent-copilot:
    profiles: ['agents']
    container_name: agent-copilot
    build:
      context: ../../agents/copilot
    restart: always
    environment:
      - COPILOT_HOME=/root/.copilot
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ../../../:/workspace
      - /workspace/.agents
      - ../../agents/skills:/workspace/.agents/skills
      - ../../data/copilot:/root/.copilot
      - ../../data/copilot/gh-config:/root/.config/gh
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    networks:
      - cortex-net
    extra_hosts:
      - 'tupynambalucas.internal.tools.mcp:host-gateway'
    command: >
      bash -c "
      mkdir -p /root/.copilot &&
      cp /workspace/cortex/agents/shared/mcp.config.json /root/.copilot/mcp-config.json || true &&
      exec tail -f /dev/null
      "

  agent-antigravity:
    profiles: ['agents']
    container_name: agent-antigravity
    build:
      context: ../../agents/antigravity
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ../../../:/workspace
      - /workspace/.agents
      - ../../agents/skills:/workspace/.agents/skills
      - ../../data/antigravity:/root/.gemini
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    networks:
      - cortex-net
    extra_hosts:
      - 'tupynambalucas.internal.tools.mcp:host-gateway'
    command: >
      bash -c "
      mkdir -p /root/.gemini/config &&
      cp /workspace/cortex/agents/shared/mcp.config.json /root/.gemini/config/mcp_config.json || true &&
      exec tail -f /dev/null
      "
