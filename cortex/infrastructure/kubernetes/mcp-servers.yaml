# MCP GitHub Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-github
  namespace: cortex
  labels:
    app: mcp-github
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-github
  template:
    metadata:
      labels:
        app: mcp-github
    spec:
      containers:
        - name: mcp-github
          image: mcp-github:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: GITHUB_PERSONAL_ACCESS_TOKEN
                  optional: true

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-github
  namespace: cortex
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: mcp-github
