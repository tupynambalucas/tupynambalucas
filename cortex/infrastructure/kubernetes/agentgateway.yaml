apiVersion: v1
kind: ConfigMap
metadata:
  name: agentgateway-config
  namespace: cortex
data:
  config.yaml: |
    config:
      adminAddr: '[::]:15000'
      statsAddr: '[::]:15001'
      logging:
        format: json
      tracing:
        otlpEndpoint: http://otel-collector.platform.svc.cluster.local:4317
        randomSampling: true
    mcp:
      port: 8080
      policies:
        cors:
          allowOrigins:
            - http://localhost:15000
            - http://127.0.0.1:15000
            - http://localhost:19000
          allowMethods:
            - '*'
            - GET
            - POST
          allowHeaders:
            - '*'
          exposeHeaders:
            - Mcp-Session-Id
          allowCredentials: true
      targets:
        - name: github
          mcp:
            host: http://mcp-github:8080/mcp
        - name: context7
          mcp:
            host: https://mcp.context7.com/mcp
          policies:
            backendAuth:
              key: "$CONTEXT7_API_KEY"
        - name: firecrawl
          mcp:
            host: http://mcp-firecrawl:8080/mcp
        - name: grafana
          mcp:
            host: http://mcp-grafana:8080/mcp
      statefulMode: stateless
      prefixMode: null
      failureMode: failOpen
    binds: []
    llm:
      port: 4000
      models: []
      providers: []
      virtualModels: []
    frontendPolicies:
      http:
        maxBufferSize: 33554432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  namespace: cortex
  labels:
    app: agentgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway
  template:
    metadata:
      labels:
        app: agentgateway
    spec:
      containers:
        - name: agentgateway
          image: cr.agentgateway.dev/agentgateway:v1.3.1
          command: ['-f', '/config.yaml']
          ports:
            - name: traffic
              containerPort: 8080
            - name: admin
              containerPort: 15000
            - name: stats
              containerPort: 15001
          volumeMounts:
            - name: config-volume
              mountPath: /config.yaml
              subPath: config.yaml
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: 'http://otel-collector.platform.svc.cluster.local:4317'
      volumes:
        - name: config-volume
          configMap:
            name: agentgateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway
  namespace: cortex
spec:
  ports:
    - name: traffic
      port: 8080
      targetPort: 8080
    - name: admin
      port: 15000
      targetPort: 15000
    - name: stats
      port: 15001
      targetPort: 15001
  selector:
    app: agentgateway
---
apiVersion: v1
kind: Service
metadata:
  name: agentgateway-metrics
  namespace: cortex
spec:
  ports:
    - name: stats
      port: 15001
      targetPort: 15001
  selector:
    app: agentgateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway-ingress
  namespace: cortex
spec:
  ingressClassName: traefik
  rules:
    - host: gateway.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway
                port:
                  number: 8080
    - host: gateway-admin.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentgateway
                port:
                  number: 15000
