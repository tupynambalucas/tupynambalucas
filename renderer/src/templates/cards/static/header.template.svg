<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 130" width="100%" height="100%">
  <defs>
    <style type="text/css">
      @font-face {
        font-family: 'Nunito';
        src: url('{{ nunitoFontBase64 }}') format('woff2');
        font-weight: 300 900;
        font-style: normal;
        font-display: swap;
      }
      
      .title {
        font-family: 'Nunito', -apple-system, sans-serif;
        font-size: 30px;
        font-weight: 850;
        fill: {{ colors.titleColor }};
        letter-spacing: -0.5px;
      }
      
      .subtitle {
        font-family: 'Nunito', -apple-system, sans-serif;
        font-size: 18px;
        font-weight: 500;
        fill: {{ colors.subtitleColor }};
        letter-spacing: 0.2px;
      }

      .highlight {
        fill: {{ colors.brandPurple }};
        font-weight: 850;
      }
    </style>
  </defs>
  
  <!-- Dynamic Greeting & Titles -->
  <text x="50%" y="55" text-anchor="middle" class="title">
    Hi! I'm <tspan class="highlight">Tupynambá Lucas</tspan>
  </text>
  <text x="50%" y="95" text-anchor="middle" class="subtitle">
    Full-Stack Software Developer &amp; Systems Architect
  </text>
</svg>
