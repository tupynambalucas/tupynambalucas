apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: platform
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
            - job_name: 'agentgateway-metrics'
              scrape_interval: 15s
              static_configs:
                - targets: ['agentgateway-metrics.cortex.svc.cluster.local:15001']
      fluentforward:
        endpoint: 0.0.0.0:24224

    exporters:
      otlphttp/grafanacloud:
        endpoint: '${env:GRAFANA_CLOUD_OTLP_ENDPOINT}'
        headers:
          Authorization: 'Basic ${env:GRAFANA_CLOUD_TOKEN}'
      otlphttp/sentry:
        endpoint: '${env:SENTRY_OTLP_ENDPOINT}'
        headers:
          x-sentry-auth: '${env:SENTRY_AUTH_HEADER}'
      debug:
        verbosity: detailed

    processors:
      batch:
        send_batch_size: 8192
        timeout: 1s
      resource/fluentd:
        attributes:
          - key: service.name
            value: agentgateway
            action: insert
      filter/sentry_errors:
        error_mode: ignore
        traces:
          span:
            - 'status.code != 2'

    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [batch]
          exporters: [otlphttp/grafanacloud, debug]
        logs:
          receivers: [otlp, fluentforward]
          processors: [resource/fluentd, batch]
          exporters: [otlphttp/grafanacloud, debug]
        traces/grafana:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlphttp/grafanacloud, debug]
        traces/sentry:
          receivers: [otlp]
          processors: [filter/sentry_errors, batch]
          exporters: [otlphttp/sentry, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: platform
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          command: ['/otelcol-contrib', '--config=/etc/otelcol-contrib/config.yaml']
          volumeMounts:
            - name: config-volume
              mountPath: /etc/otelcol-contrib
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: fluentforward
              containerPort: 24224
          envFrom:
            - secretRef:
                name: otel-collector-secrets
                optional: true
      volumes:
        - name: config-volume
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: platform
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: fluentforward
      port: 24224
      targetPort: 24224
  selector:
    app: otel-collector
