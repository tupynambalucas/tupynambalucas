services:
  # ---------------------------------------------------------------- #
  # Redis — Local Build and Port Mapping
  # ---------------------------------------------------------------- #
  redis:
    build:
      context: ../../services/redis
      dockerfile: Dockerfile
    ports:
      - '${REDIS_PORT:-6379}:6379'

    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------- #
  # MongoDB — Local Build and Port Mapping
  # ---------------------------------------------------------------- #
  db:
    build:
      context: ../../services/mongodb
      dockerfile: Dockerfile
    ports:
      - '${MONGO_PORT:-27017}:27017'
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/data/mongo-keyfile']

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------- #
  # MongoDB RS Init
  # ---------------------------------------------------------------- #
  db-init:
    build:
      context: ../../services/mongodb
      dockerfile: Dockerfile
    entrypoint: ['./init-db.sh']
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      ADMIN_USER_SEED: ${ADMIN_USER_SEED}
      ADMIN_EMAIL_SEED: ${ADMIN_EMAIL_SEED}
      ADMIN_PASS_SEED: ${ADMIN_PASS_SEED}

volumes:
  mongo-data:
    name: tupynambalucas_hub_mongo_data
  redis-data:
    name: tupynambalucas_hub_redis_data
