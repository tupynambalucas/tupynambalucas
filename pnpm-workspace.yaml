catalogMode: 'strict'

minimumReleaseAgeExclude:
  - turbo
  - '@turbo/darwin-64'
  - '@turbo/darwin-arm64'
  - '@turbo/linux-64'
  - '@turbo/linux-arm64'
  - '@turbo/windows-64'
  - '@turbo/windows-arm64'
  - miniflare@4.20260706.0
  - wrangler@4.108.0

packages:
  - 'hub/services/*'
  - 'hub/packages/*'
  - 'shared/*'
  - 'studio/*'
  - 'tools/*'
  - 'docs'
  - 'profile'

catalog:
  '@types/node': '^25.6.0'
  'typescript': '^6.0.3'
  'tsx': '^4.19.3'
  'rimraf': '^6.1.2'
  'turbo': '2.10.0'
  'kill-port': '^2.0.1'
  'husky': '^9.1.7'
  'lint-staged': '^15.4.3'
  'glob': '^11.0.1'
  '@types/glob': '^8.1.0'
  '@aws-sdk/client-s3': '^3.714.0'
  '@smithy/node-http-handler': '^4.8.2'
  'mime-types': '^2.1.35'
  '@types/mime-types': '^2.1.4'
  '@clack/prompts': '^0.9.1'
  '@changesets/cli': ^2.31.0
  'wrangler': '^4.108.0'
  jimp: ^1.6.1

catalogs:
  tooling-stack:
    '@eslint/compat': '2.1.0'
    '@eslint/js': '10.0.1'
    '@typescript-eslint/eslint-plugin': '8.62.0'
    'eslint': '10.5.0'
    'eslint-import-resolver-typescript': '4.4.5'
    'eslint-plugin-import': '^2.32.0'
    'eslint-plugin-mdx': '3.8.1'
    'eslint-plugin-prettier': '^5.2.3'
    'eslint-config-prettier': '^10.0.1'
    'prettier': '3.8.4'
    'typescript-eslint': '8.62.0'

  shared-stack:
    'zod': '^4.3.6'
    'dotenv': '^17.2.4'
    'date-fns': '^4.1.0'
    'axios': '^1.13.5'
    '@react-three/fiber': '9.6.1'
    '@react-three/drei': '10.7.7'
    'three': '0.184.0'
    '@types/three': '0.184.0'
    'three-stdlib': '2.36.1'
    'tailwindcss': '^4.1.18'

  web-stack:
    # Dependencies
    '@gsap/react': '^2.1.2'
    'gsap': '^3.14.2'
    'react': '^19.2.4'
    'react-dom': '^19.2.4'
    'react-i18next': '^16.5.4'
    'i18next': '^25.8.4'
    'react-datepicker': '^9.1.0'
    'zustand': '^5.0.11'
    '@marsidev/react-turnstile': '^1.5.2'
    # Dev Dependencies
    '@vitejs/plugin-react-swc': '^4.2.3'
    '@tailwindcss/vite': '^4.1.18'
    '@types/react': '^19.2.13'
    '@types/react-dom': '^19.2.3'
    'vite': '^8.0.10'
    'eslint-plugin-react': '^7.37.5'
    'eslint-plugin-react-hooks': '^7.1.1'
    'eslint-plugin-react-refresh': '^0.5.2'
    'vite-plugin-svgr': '^4.5.0'
    '@tailwindcss/postcss': '^4.1.18'

  docs-stack:
    '@docusaurus/core': '3.10.1'
    '@docusaurus/faster': '3.10.1'
    '@docusaurus/preset-classic': '3.10.1'
    '@docusaurus/theme-live-codeblock': '3.10.1'
    '@docusaurus/theme-mermaid': '3.10.1'
    '@mdx-js/react': '^3.0.0'
    'clsx': '^2.0.0'
    'prism-react-renderer': '^2.3.0'
    '@docusaurus/module-type-aliases': '3.10.1'
    '@docusaurus/tsconfig': '3.10.1'
    '@docusaurus/types': '3.10.1'
    # Core plugin/theme packages needed for custom local preset
    '@docusaurus/plugin-content-docs': '3.10.1'
    '@docusaurus/plugin-content-blog': '3.10.1'
    '@docusaurus/plugin-content-pages': '3.10.1'
    '@docusaurus/plugin-debug': '3.10.1'
    '@docusaurus/plugin-google-gtag': '3.10.1'
    '@docusaurus/plugin-google-tag-manager': '3.10.1'
    '@docusaurus/plugin-sitemap': '3.10.1'
    '@docusaurus/plugin-svgr': '3.10.1'
    '@docusaurus/plugin-css-cascade-layers': '3.10.1'
    '@docusaurus/theme-classic': '3.10.1'
    '@docusaurus/theme-search-algolia': '3.10.1'
    '@docusaurus/theme-common': '3.10.1'

  api-stack:
    # Dependencies
    '@fastify/cookie': '^11.0.2'
    '@fastify/cors': '^11.2.0'
    '@fastify/csrf-protection': '^7.1.0'
    '@fastify/env': '^6.0.0'
    '@fastify/http-proxy': '^11.0.0'
    '@fastify/jwt': '^10.0.0'
    '@fastify/one-line-logger': '^2.1.0'
    '@fastify/rate-limit': '^10.3.0'
    '@fastify/session': '^11.1.1'
    '@fastify/sse': '^0.4.0'
    '@sentry/node': '^10.38.0'
    '@sentry/profiling-node': '^10.38.0'
    'bcrypt': '^6.0.0'
    'bullmq': '^5.67.3'
    'fastify': '^5.7.4'
    'fastify-metrics': '^12.1.0'
    'fastify-plugin': '^5.1.0'
    'fastify-type-provider-zod': '^6.1.0'
    'ioredis': '5.10.1'
    'mongoose': '^9.2.0'
    'pino-roll': '^4.0.0'
    'sdk-node-apis-efi': '^1.2.28'
    # Dev Dependencies
    '@types/bcrypt': '^6.0.0'

  studio-stack:
    '@fontsource-variable/nunito': '^5.2.7'
    'react-icons': '^5.5.0'

allowBuilds:
  '@sentry-internal/node-cpu-profiler': true
  '@sentry/node-cpu-profiler': true
  '@swc/core': true
  'bcrypt': true
  'core-js': true
  'esbuild': true
  'msgpackr-extract': true
  'sharp': true
  'unrs-resolver': true
  'workerd': true
