name: tupynambalucas-mcp

services:
  # ==========================================
  # INFRASTRUCTURE CORE (Control Plane)
  # ==========================================
  agentgateway:
    profiles: ['dev', 'prod', 'staging']
    image: cr.agentgateway.dev/agentgateway:v1.3.1
    container_name: tupynambalucas-mcp-agentgateway-${APP_ENV:-prod}
    ports:
      - '${GATEWAY_PORT:-3005}:8080' # Tráfego principal IAs
      - '15000:15000' # Web UI do AgentGateway
    volumes:
      - ../../gateway/config.yaml:/config.yaml
    command: ['-f', '/config.yaml']
    logging:
      driver: fluentd
      options:
        fluentd-address: 'host.docker.internal:24224'
        tag: 'agentgateway'
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tupynambalucas-monitor-otel-dev:4317}
    networks:
      tupynambalucas-mcp-net:
        aliases:
          - tupynambalucas.internal.tools.mcp
      tupynambalucas-monitor-net:
        aliases:
          - agentgateway-metrics
  # ==========================================
  # MCP SERVERS (Data Plane)
  # ==========================================
  github:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-github-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/github/Dockerfile
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      - tupynambalucas-mcp-net

  context7:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-context7-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/context7/Dockerfile
    environment:
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
    networks:
      - tupynambalucas-mcp-net

  browser:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-browser-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/browser/Dockerfile
    environment:
      - MCP_REWRITE_LOCALHOST=${BROWSER_REWRITE_LOCALHOST}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'tupynambalucas.internal:host-gateway'
    shm_size: '2gb'
    networks:
      - tupynambalucas-mcp-net

  dockerhub:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-dockerhub-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/dockerhub/Dockerfile
    environment:
      - HUB_PAT_TOKEN=${DOCKERHUB_PAT_TOKEN}
      - HUB_USERNAME=${DOCKERHUB_USERNAME}
    networks:
      - tupynambalucas-mcp-net

  firecrawl:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-firecrawl-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/firecrawl/Dockerfile
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    networks:
      - tupynambalucas-mcp-net

  grafana:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-grafana-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/grafana/Dockerfile
    environment:
      - GRAFANA_URL=${GRAFANA_CLOUD_URL}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    networks:
      - tupynambalucas-mcp-net

networks:
  tupynambalucas-mcp-net:
    name: tupynambalucas-mcp-net
    driver: bridge
  tupynambalucas-monitor-net:
    external: true
