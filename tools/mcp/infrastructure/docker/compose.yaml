name: tupynambalucas-mcp

networks:
  tupynambalucas-mcp-net:
    name: tupynambalucas-mcp-net
    driver: bridge

services:
  # ==========================================
  # MCP SERVERS (Data Plane)
  # ==========================================
  github:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-github-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/github/Dockerfile
    environment:
      - GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_PERSONAL_ACCESS_TOKEN}
    networks:
      - tupynambalucas-mcp-net

  context7:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-context7-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/context7/Dockerfile
    environment:
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
    networks:
      - tupynambalucas-mcp-net

  dockerhub:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-dockerhub-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/dockerhub/Dockerfile
    environment:
      - HUB_PAT_TOKEN=${DOCKERHUB_PAT_TOKEN}
      - HUB_USERNAME=${DOCKERHUB_USERNAME}
    networks:
      - tupynambalucas-mcp-net

  firecrawl:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-firecrawl-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/firecrawl/Dockerfile
    environment:
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    networks:
      - tupynambalucas-mcp-net

  grafana:
    profiles: ['dev', 'prod', 'staging']
    container_name: tupynambalucas-mcp-grafana-${APP_ENV:-prod}
    build:
      context: ../../
      dockerfile: services/grafana/Dockerfile
    environment:
      - GRAFANA_URL=${GRAFANA_CLOUD_URL}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
    networks:
      - tupynambalucas-mcp-net
