name: tupynambalucas-agents

networks:
  tupynambalucas-agents-net:
    name: tupynambalucas-agents-net
    driver: bridge

services:
  copilot:
    build:
      context: ../../services/copilot
    container_name: agent-copilot
    restart: always
    env_file:
      - ../../services/copilot/.env.copilot
    environment:
      - COPILOT_HOME=/root/.copilot
    volumes:
      # Mount monorepo workspace as the active working directory
      - ../../../../:/workspace
      # Mask the workspace-level .agents folder to prevent loading host configurations
      - /workspace/.agents
      # Inject shared skills into the container workspace virtual .agents folder
      - ../../skills:/workspace/.agents/skills
      # Persist Copilot session state, authentication tokens and configuration
      - ../../data/copilot:/root/.copilot
      # Persist GitHub CLI credentials and extensions
      - ../../data/copilot/gh-config:/root/.config/gh
      # Mount host SSH keys and Git identity for repository operations (read-only)
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      # Mount host Docker socket for Docker-out-of-Docker orchestration
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    networks:
      - tupynambalucas-agents
    extra_hosts:
      - 'tupynambalucas.internal.tools.mcp:host-gateway'
    command: >
      bash -c "
      mkdir -p /root/.copilot &&
      cp /workspace/tools/agents/infrastructure/config/mcp.config.json /root/.copilot/mcp-config.json &&
      exec tail -f /dev/null
      "

  antigravity:
    build:
      context: ../../services/antigravity
    container_name: agent-antigravity
    restart: always
    env_file:
      - ../../services/antigravity/.env.antigravity
    volumes:
      # Mount monorepo workspace as the active working directory
      - ../../../../:/workspace
      # Mask the workspace-level .agents folder to prevent loading host configurations
      - /workspace/.agents
      # Inject shared skills into the container workspace virtual .agents folder
      - ../../skills:/workspace/.agents/skills
      # Persist dynamic runtime data: brain, conversations, histories, log buffers
      - ../../data/antigravity:/root/.gemini
      # Mount host SSH keys and Git identity for repository operations (read-only)
      - ~/.ssh:/root/.ssh:ro
      - ~/.gitconfig:/root/.gitconfig:ro
      # Mount host Docker socket for Docker-out-of-Docker orchestration
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    networks:
      - tupynambalucas-agents
    extra_hosts:
      - 'tupynambalucas.internal.tools.mcp:host-gateway'
    command: >
      bash -c "
      mkdir -p /root/.gemini/config &&
      cp /workspace/tools/agents/infrastructure/config/mcp.config.json /root/.gemini/config/mcp_config.json &&
      exec tail -f /dev/null
      "
