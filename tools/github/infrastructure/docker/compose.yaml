name: tupynambalucas-github

services:
  # Service 1: Long-running interactive GitHub CLI service for docker exec use
  gh:
    build:
      context: ../../services/gh
      dockerfile: Dockerfile
    container_name: github-gh-cli
    volumes:
      - ../../../../:/workspace
    env_file:
      - ../../services/gh/.env.gh
    environment:
      - GH_TOKEN=${GH_TOKEN}
      - GH_REPO=${GH_REPO}
      - GH_AUTHOR_NAME=${GIT_AUTHOR_NAME}
      - GH_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL}
      - GH_COMMITTER_NAME=${GIT_COMMITTER_NAME}
      - GH_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL}
      - EDITOR=${EDITOR:-nano}
      - PAGER=${PAGER:-less}
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: ['tail', '-f', '/dev/null']

  # Service 2: Long-running git-only container for commits and local git operations
  git:
    build:
      context: ../../services/git
      dockerfile: Dockerfile
    container_name: github-git-bash
    volumes:
      - ../../../../:/workspace
    env_file:
      - ../../services/git/.env.git
    environment:
      - GH_TOKEN=${GH_TOKEN}
      - GH_REPO=${GH_REPO}
      - GH_AUTHOR_NAME=${GIT_AUTHOR_NAME}
      - GH_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL}
      - GH_COMMITTER_NAME=${GIT_COMMITTER_NAME}
      - GH_COMMITTER_EMAIL=${GIT_COMMITTER_EMAIL}
      - EDITOR=${EDITOR:-nano}
      - PAGER=${PAGER:-less}
    working_dir: /workspace
    tty: true
    stdin_open: true
    command: ['tail', '-f', '/dev/null']
