name: Profile Stats Generator

on:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Profile Generator
        run: pnpm --filter @tupynambalucas/profile generate
        env:
          PROFILE_GH_PAT: ${{ secrets.PROFILE_GH_PAT }}
          GITHUB_ACTIONS: "true"
